<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus-Management | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        .bg-corp-blue { background-color: #1e3a8a; }
        .time-badge-green { @apply bg-emerald-100 text-emerald-800 border border-emerald-200 px-2 py-0.5 rounded font-bold text-[10px]; }
        .time-badge-orange { @apply bg-orange-100 text-orange-800 border border-orange-200 px-2 py-0.5 rounded font-bold text-[10px]; }
        #bus-gimmick { position: fixed; left: -150px; bottom: 20%; font-size: 3rem; color: #1e3a8a; z-index: 9999; pointer-events: none; display: none; }
        @keyframes driveRight { 0% { left: -150px; } 100% { left: 110%; } }
        .animate-bus { display: block !important; animation: driveRight 2.5s linear forwards; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 text-xs md:text-sm">

    <div id="bus-gimmick"><i class="fas fa-bus"></i></div>

    <div id="login-screen" class="fixed inset-0 bg-corp-blue flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
            <div class="text-center mb-6">
                <i class="fas fa-bus text-3xl text-corp-blue mb-2"></i>
                <h2 class="text-xl font-bold">Fit for Drive</h2>
                <p class="text-[9px] text-slate-400 uppercase tracking-widest">Gib deine Zugangsdaten ein</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="login-user" placeholder="Benutzername" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
                <input type="password" id="login-pass" placeholder="Passwort" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-600">
                <div class="flex items-center gap-2 px-1">
                    <input type="checkbox" id="remember-me" class="w-3 h-3 cursor-pointer">
                    <label for="remember-me" class="text-[10px] text-slate-500 uppercase font-bold tracking-wider cursor-pointer">Passwort speichern?</label>
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-700 text-white p-3 rounded-xl font-bold hover:bg-blue-800 transition uppercase tracking-widest">Einloggen</button>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden min-h-screen flex flex-col">
        <header class="bg-corp-blue text-white py-1.5 px-4 flex justify-between items-center shadow-md sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <i class="fas fa-bus text-blue-300 text-sm"></i>
                <h1 class="font-black tracking-tighter uppercase text-sm">Bus<span class="text-blue-300">Planer</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right border-r border-blue-700 pr-3">
                    <div id="current-date" class="text-[9px] text-blue-200 uppercase"></div>
                    <div id="current-time" class="text-xs font-mono font-bold"></div>
                </div>
                <div id="user-display" class="text-[10px] font-bold bg-blue-800 px-2 py-0.5 rounded uppercase"></div>
                <button onclick="logout()" class="hover:text-red-400 transition"><i class="fas fa-power-off text-xs"></i></button>
            </div>
        </header>

        <main class="flex-1 p-4 max-w-6xl mx-auto w-full space-y-6">
            <section class="bg-blue-50/50 p-5 rounded-xl border border-blue-100 shadow-sm">
                <h2 class="text-[10px] font-black mb-4 uppercase tracking-[0.2em] text-blue-600"><i class="fas fa-calendar-alt mr-2"></i><span id="form-title">Fahrt reservieren</span></h2>
                <input type="hidden" id="edit-booking-id">
                <div class="grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-blue-400 uppercase ml-1">Datum</label>
                        <input type="date" id="book-date" class="p-2.5 border border-blue-200 rounded-lg outline-none w-full bg-white">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-blue-400 uppercase ml-1">Uhrzeit (von - bis)</label>
                        <div class="flex items-center gap-1">
                            <input type="time" id="book-time-start" class="p-2.5 border border-blue-200 rounded-lg w-full outline-none bg-white">
                            <span class="text-blue-300 font-bold px-1">-</span>
                            <input type="time" id="book-time-end" class="p-2.5 border border-blue-200 rounded-lg w-full outline-none bg-white">
                        </div>
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-[9px] font-bold text-blue-400 uppercase ml-1">Fahrer / Person</label>
                        <select id="book-for-user" class="p-2.5 border border-blue-200 rounded-lg outline-none w-full bg-white font-bold text-blue-800"></select>
                    </div>
                    <div class="flex flex-col gap-1 md:col-span-2">
                        <label class="text-[9px] font-bold text-blue-400 uppercase ml-1">Zielort / Zweck</label>
                        <input type="text" id="book-reason" placeholder="z.B. Kundentermin" class="p-2.5 border border-blue-200 rounded-lg outline-none w-full bg-white">
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-save-booking" onclick="saveBooking()" class="flex-1 bg-blue-600 text-white py-2.5 px-4 rounded-lg font-bold hover:bg-blue-700 transition text-[11px] uppercase tracking-widest shadow-md h-[42px]">Speichern</button>
                        <button id="btn-cancel-edit" onclick="resetBookingForm()" class="hidden bg-slate-400 text-white py-2.5 px-4 rounded-lg font-bold hover:bg-slate-500 transition text-[11px] uppercase h-[42px]"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            </section>

            <section class="bg-emerald-50/30 rounded-xl border border-emerald-100 shadow-sm overflow-hidden">
                <div class="bg-emerald-600 px-4 py-2 text-white flex justify-between items-center">
                    <h2 class="text-[10px] font-black uppercase tracking-widest">Aktuelle Termine</h2>
                </div>
                <div class="overflow-x-auto bg-white"><table class="w-full text-left"><tbody id="booking-list" class="divide-y divide-emerald-50"></tbody></table></div>
            </section>

            <section class="bg-orange-50/50 rounded-xl border border-orange-100 shadow-sm overflow-hidden opacity-90">
                <div class="bg-orange-500 px-4 py-2 text-white flex justify-between items-center"><h2 class="text-[10px] font-black uppercase tracking-widest">Archiv</h2></div>
                <div class="overflow-x-auto max-h-64 bg-white/80"><table class="w-full text-left"><tbody id="archive-list" class="divide-y divide-orange-100"></tbody></table></div>
            </section>

            <section id="admin-section" class="hidden bg-white p-4 rounded-xl border border-slate-200 shadow-sm border-t-4 border-t-red-600">
                <h2 class="text-[10px] font-black text-slate-600 uppercase mb-4 tracking-widest">Benutzerverwaltung</h2>
                <div class="bg-slate-50 p-4 rounded-lg mb-6 border border-slate-200">
                    <input type="hidden" id="edit-user-id">
                    <div class="flex flex-wrap gap-2">
                        <input type="text" id="new-username" placeholder="Name" class="p-2 text-xs border rounded-md">
                        <input type="text" id="new-password" placeholder="Passwort" class="p-2 text-xs border rounded-md">
                        <select id="new-role" class="p-2 text-xs border rounded-md bg-white">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                        <button id="user-submit-btn" onclick="addUser()" class="bg-slate-800 text-white px-4 py-2 rounded-md text-[10px] font-bold uppercase hover:bg-black transition">Anlegen</button>
                        <button id="cancel-edit-btn" onclick="resetUserForm()" class="hidden bg-slate-400 text-white px-4 py-2 rounded-md text-[10px] font-bold uppercase hover:bg-slate-500 transition">Abbrechen</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3" id="user-grid"></div>
            </section>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAQOrhZbOtPTRf9zA1KAZ4gRNwXlVlpBp8",
            authDomain: "bus-planer.firebaseapp.com",
            databaseURL: "https://bus-planer-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "bus-planer",
            storageBucket: "bus-planer.firebasestorage.app",
            messagingSenderId: "995350119755",
            appId: "1:995350119755:web:a744e78d79cd3ee1c854ce"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let users = [], bookings = [], archive = [], currentUser = null;
        const protectedNames = ['admin', 'Administrator', 'Helmut'];

        function loadData() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                users = Object.values(data.users || {});
                bookings = Object.values(data.bookings || {});
                archive = Object.values(data.archive || {});
                if(currentUser) initDashboard();
            });
        }

        window.onload = function() {
            loadData(); updateDateTime(); setInterval(updateDateTime, 1000);
            const savedUser = localStorage.getItem('bus_user'), savedPass = localStorage.getItem('bus_pass');
            if(savedUser && savedPass) {
                document.getElementById('login-user').value = savedUser;
                document.getElementById('login-pass').value = savedPass;
                document.getElementById('remember-me').checked = true;
            }
        };

        function handleLogin() {
            const inputUser = document.getElementById('login-user').value.trim(), inputPass = document.getElementById('login-pass').value.trim(), remember = document.getElementById('remember-me').checked;
            const found = users.find(u => u.name === inputUser && u.pass === inputPass);
            if (found) {
                if(remember) { localStorage.setItem('bus_user', inputUser); localStorage.setItem('bus_pass', inputPass); }
                else { localStorage.removeItem('bus_user'); localStorage.removeItem('bus_pass'); }
                currentUser = found;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                document.getElementById('user-display').innerText = currentUser.name;
                initDashboard();
            } else alert("Login fehlgeschlagen!");
        }

        function initDashboard() {
            renderBookings(); renderArchive();
            const bookForSelect = document.getElementById('book-for-user');
            bookForSelect.innerHTML = users.map(u => `<option value="${u.name}" ${u.name === currentUser.name ? 'selected' : ''}>${u.name}</option>`).join('');
            if (currentUser.role === 'admin') { document.getElementById('admin-section').classList.remove('hidden'); renderUsers(); }
            else document.getElementById('admin-section').classList.add('hidden');
        }

        // --- Buchungs Logik ---
        function saveBooking() {
            const id = document.getElementById('edit-booking-id').value;
            const date = document.getElementById('book-date').value, start = document.getElementById('book-time-start').value, end = document.getElementById('book-time-end').value, reason = document.getElementById('book-reason').value, targetPerson = document.getElementById('book-for-user').value;
            
            if(!date || !start || !end || !reason) return alert("Bitte alle Felder ausfüllen!");
            if(start >= end) return alert("Endzeit muss nach Startzeit liegen!");
            
            const conflict = bookings.find(b => b.id != id && b.date === date && (start < b.end && end > b.start));
            if(conflict) return alert(`Überschneidung mit "${conflict.person}".`);

            const bookingId = id ? id : Date.now();
            db.ref('bookings/' + bookingId).set({ id: parseInt(bookingId), date, start, end, reason, person: targetPerson }).then(() => {
                if(!id) {
                    const bus = document.getElementById('bus-gimmick');
                    bus.classList.remove('animate-bus'); void bus.offsetWidth; bus.classList.add('animate-bus');
                }
                resetBookingForm();
            });
        }

        function editBooking(id) {
            const b = bookings.find(x => x.id == id);
            if(b) {
                document.getElementById('edit-booking-id').value = b.id;
                document.getElementById('book-date').value = b.date;
                document.getElementById('book-time-start').value = b.start;
                document.getElementById('book-time-end').value = b.end;
                document.getElementById('book-reason').value = b.reason;
                document.getElementById('book-for-user').value = b.person;
                document.getElementById('form-title').innerText = "Termin bearbeiten";
                document.getElementById('btn-save-booking').innerText = "Aktualisieren";
                document.getElementById('btn-cancel-edit').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function resetBookingForm() {
            document.getElementById('edit-booking-id').value = "";
            document.getElementById('book-date').value = "";
            document.getElementById('book-time-start').value = "";
            document.getElementById('book-time-end').value = "";
            document.getElementById('book-reason').value = "";
            document.getElementById('book-for-user').value = currentUser.name;
            document.getElementById('form-title').innerText = "Fahrt reservieren";
            document.getElementById('btn-save-booking').innerText = "Speichern";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
        }

        function renderBookings() {
            bookings.sort((a, b) => new Date(a.date) - new Date(b.date));
            document.getElementById('booking-list').innerHTML = bookings.map(b => `
                <tr class="hover:bg-emerald-50 border-l-4 ${b.person === currentUser.name ? 'border-l-emerald-500' : 'border-l-transparent'}">
                    <td class="p-3 font-bold text-emerald-900">${new Date(b.date).toLocaleDateString('de-DE')}</td>
                    <td class="p-3"><div class="time-badge-green">${b.start} - ${b.end}</div></td>
                    <td class="p-3 text-[10px] font-bold text-blue-600 uppercase italic">${b.person}</td>
                    <td class="p-3 font-medium text-slate-700">${b.reason}</td>
                    <td class="p-3 text-right">
                        <div class="flex gap-2 justify-end">
                            ${(currentUser.role === 'admin' || b.person === currentUser.name) ? `
                                <button onclick="editBooking(${b.id})" title="Bearbeiten" class="text-blue-400 hover:text-blue-600 px-1"><i class="fas fa-edit"></i></button>
                                <button onclick="moveToArchive(${b.id})" class="bg-emerald-600 text-white px-2 py-1 rounded text-[9px] font-black uppercase">Archiv</button>
                                <button onclick="deleteBooking(${b.id})" class="text-slate-300 hover:text-red-500 px-1"><i class="fas fa-trash-alt"></i></button>
                            ` : ''}
                        </div>
                    </td>
                </tr>`).join('');
        }

        function deleteBooking(id) { if(confirm("Termin wirklich löschen?")) db.ref('bookings/' + id).remove(); }
        function moveToArchive(id) { const b = bookings.find(x => x.id === id); db.ref('archive/' + id).set(b).then(() => db.ref('bookings/' + id).remove()); }
        function restoreFromArchive(id) {
            const b = archive.find(x => x.id === id);
            if(bookings.find(x => x.date === b.date && (b.start < x.end && b.end > x.start))) return alert("Überschneidung im Kalender!");
            db.ref('bookings/' + id).set(b).then(() => db.ref('archive/' + id).remove());
        }

        function renderArchive() {
            archive.sort((a, b) => new Date(b.date) - new Date(a.date));
            document.getElementById('archive-list').innerHTML = archive.map(b => `
                <tr class="border-l-4 border-l-orange-300 bg-white/50">
                    <td class="p-2 font-black text-orange-600 text-[9px] uppercase">${new Date(b.date).toLocaleDateString('de-DE', {month: 'short'})}</td>
                    <td class="p-2 text-slate-400 font-bold">${new Date(b.date).toLocaleDateString('de-DE')}</td>
                    <td class="p-2"><div class="time-badge-orange">${b.start}-${b.end}</div></td>
                    <td class="p-2 text-slate-500 italic">(${b.person}) ${b.reason}</td>
                    <td class="p-2 text-right">
                        <div class="flex gap-3 justify-end items-center">
                            ${(currentUser.role === 'admin' || b.person === currentUser.name) ? `
                                <button onclick="restoreFromArchive(${b.id})" title="Wiederherstellen" class="text-emerald-500 hover:text-emerald-700"><i class="fas fa-undo"></i></button>
                                <button onclick="finalDelete(${b.id})" title="Löschen" class="text-orange-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                            ` : ''}
                        </div>
                    </td>
                </tr>`).join('');
        }

        function finalDelete(id) { if(confirm("Endgültig löschen?")) db.ref('archive/' + id).remove(); }

        // --- User Admin Logik (unverändert) ---
        function addUser() {
            const id = document.getElementById('edit-user-id').value, n = document.getElementById('new-username').value.trim(), p = document.getElementById('new-password').value.trim(), r = document.getElementById('new-role').value;
            if (!n || !p) return alert("Felder füllen!");
            const userId = id ? id : Date.now();
            db.ref('users/' + userId).set({ id: parseInt(userId), name: n, pass: p, role: r }).then(() => resetUserForm());
        }
        function editUser(id) {
            const u = users.find(x => x.id == id);
            if(u && !protectedNames.includes(u.name)) {
                document.getElementById('edit-user-id').value = u.id; document.getElementById('new-username').value = u.name;
                document.getElementById('new-password').value = u.pass; document.getElementById('new-role').value = u.role;
                document.getElementById('user-submit-btn').innerText = "Speichern"; document.getElementById('cancel-edit-btn').classList.remove('hidden');
            }
        }
        function resetUserForm() { document.getElementById('edit-user-id').value = ""; document.getElementById('new-username').value = ""; document.getElementById('new-password').value = ""; document.getElementById('user-submit-btn').innerText = "Anlegen"; document.getElementById('cancel-edit-btn').classList.add('hidden'); }
        function renderUsers() {
            document.getElementById('user-grid').innerHTML = users.map(u => `
                <div class="bg-white border p-3 rounded-lg flex justify-between items-center shadow-sm">
                    <div><p class="font-black text-slate-800 text-[10px] uppercase">${u.name}</p><p class="text-[8px] text-blue-600 font-bold">${u.role.toUpperCase()}</p></div>
                    <div class="flex gap-3">${protectedNames.includes(u.name) ? '<i class="fas fa-lock text-slate-300"></i>' : `<button onclick="editUser(${u.id})" class="text-slate-400 hover:text-blue-600"><i class="fas fa-edit"></i></button><button onclick="deleteUser(${u.id})" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>`}</div>
                </div>`).join('');
        }
        function deleteUser(id) { const u = users.find(x => x.id == id); if(!protectedNames.includes(u.name) && confirm("Löschen?")) db.ref('users/' + id).remove(); }

        function updateDateTime() {
            const now = new Date();
            document.getElementById('current-date').innerText = now.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: 'short' });
            document.getElementById('current-time').innerText = now.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        }
        function logout() { currentUser = null; document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('app-content').classList.add('hidden'); }
    </script>
</body>
</html>
